name: Daily Learning Prompt

on:
  workflow_dispatch:
  schedule:
    - cron: '30 12 * * *'

jobs:
  generate-learning-prompt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate deterministic learning prompt
        run: |
          mkdir -p output
          DATE=$(date -u +%F)
          cat > output/daily_learning.txt <<EOF
          Daily learning prompt for ${DATE}

          Review one live revenue workflow. Identify the intake source, conversion path, payment path, failure point, and one improvement that reduces manual work without adding paid dependencies.
          EOF
          cat output/daily_learning.txt

      - name: Upload learning prompt
        uses: actions/upload-artifact@v4
        with:
          name: daily-learning-prompt
          path: output/daily_learning.txt
