name: AI Profit Suite CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile *.py scripts/generate_summary.py

      - name: Run tests
        run: pytest -q

      - name: Generate summary artifact
        run: python scripts/generate_summary.py sample_data.json output/daily_summary.pdf

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: output/daily_summary.pdf
